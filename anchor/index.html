<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ANCHOR</title>
<link rel="manifest" id="manifest-placeholder">
<meta name="theme-color" content="#1A1A1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F7F4EF;
    --paper-dark: #EDE9E1;
    --ink: #1A1A18;
    --ink-light: #5A5750;
    --ink-faint: #A8A49C;
    --accent: #2C4A3E;
    --rule: #D8D3CA;
    --c1: #2C4A3E;
    --c2: #5C3D5C;
    --c3: #2C4A3E;
    --c4: #1A1A18;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
  }

  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  /* ── HOME ── */
  .home-top {
    padding: 56px 32px 28px;
    border-bottom: 1px solid var(--rule);
  }

  .wordmark {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.35em;
    color: var(--ink-faint);
    text-transform: uppercase;
    font-weight: 300;
    margin-bottom: 36px;
  }

  .home-date {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--ink-light);
    letter-spacing: 0.05em;
    margin-bottom: 10px;
    font-weight: 300;
  }

  .home-heading {
    font-size: 40px;
    font-weight: 300;
    line-height: 1.15;
    letter-spacing: -0.01em;
  }

  .home-heading em { font-style: italic; color: var(--accent); }

  .streak-row {
    padding: 20px 32px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .streak-n {
    font-family: 'DM Mono', monospace;
    font-size: 32px;
    font-weight: 400;
    line-height: 1;
  }

  .streak-info { display: flex; flex-direction: column; gap: 3px; flex: 1; }
  .streak-info strong { font-size: 13px; font-weight: 500; letter-spacing: 0.02em; }
  .streak-info span { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--ink-faint); font-weight: 300; }

  .streak-dots { display: flex; gap: 5px; align-items: center; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--rule); transition: background 0.3s; }
  .dot.on { background: var(--accent); }
  .dot.now { background: var(--accent); box-shadow: 0 0 0 2px var(--paper), 0 0 0 3px var(--accent); }

  .sections-list {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--rule);
  }

  .section-row {
    background: var(--paper);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .section-row-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

  .section-row-name {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-light);
    font-weight: 300;
    flex: 1;
  }

  .section-row-time {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--ink-faint);
    font-weight: 300;
  }

  .home-bottom {
    padding: 20px 32px;
    padding-bottom: max(20px, env(safe-area-inset-bottom));
  }

  .btn-primary {
    width: 100%;
    padding: 18px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    font-weight: 300;
    transition: background 0.2s;
  }

  .btn-primary:active { background: var(--accent); transform: scale(0.99); }

  .done-note {
    text-align: center;
    margin-top: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink-faint);
    font-weight: 300;
    letter-spacing: 0.05em;
  }

  /* ── SESSION ── */
  .session-bar {
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    background: var(--paper);
    z-index: 10;
  }

  .btn-back {
    background: none;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--ink-faint);
    cursor: pointer;
    text-transform: uppercase;
  }

  .prog-wrap { flex: 1; display: flex; flex-direction: column; gap: 5px; }

  .prog-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    font-weight: 300;
  }

  .prog-track { height: 1px; background: var(--rule); }
  .prog-fill { height: 100%; background: var(--accent); transition: width 0.5s ease; }

  /* ── CARD ── */
  .card {
    flex: 1;
    padding: 36px 24px 24px;
    display: flex;
    flex-direction: column;
    animation: rise 0.35s ease;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-tag {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 24px;
  }

  .card-tag-dot { width: 5px; height: 5px; border-radius: 50%; }

  .card-tag-text {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 300;
  }

  .card-title {
    font-size: 26px;
    font-weight: 300;
    line-height: 1.35;
    letter-spacing: -0.01em;
    margin-bottom: 6px;
  }

  .card-title em { font-style: italic; color: var(--ink-light); }

  .card-sub {
    font-size: 14px;
    color: var(--ink-faint);
    font-style: italic;
    line-height: 1.5;
    font-weight: 300;
    margin-bottom: 32px;
  }

  .opening-line {
    border-left: 1px solid var(--accent);
    padding: 14px 18px;
    margin-bottom: 32px;
    background: var(--paper-dark);
    min-height: 52px;
    position: relative;
  }

  .opening-line.loading::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    height: 1px;
    background: var(--accent);
    animation: loadbar 1.4s ease infinite;
  }

  @keyframes loadbar {
    0% { width: 0; opacity: 1; }
    80% { width: 90%; opacity: 1; }
    100% { width: 100%; opacity: 0; }
  }

  .opening-line-text {
    font-size: 17px;
    line-height: 1.6;
    color: var(--ink);
    font-style: italic;
    font-weight: 300;
  }

  .opening-line-text.faint { color: var(--ink-faint); font-size: 13px; }

  .timer-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
  }

  .timer-ring { position: relative; width: 52px; height: 52px; flex-shrink: 0; }
  .timer-ring svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--rule); stroke-width: 1.5; }
  .ring-fg { fill: none; stroke-width: 1.5; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
  .timer-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px; font-weight: 400; color: var(--ink);
  }

  .timer-right { display: flex; flex-direction: column; gap: 6px; }

  .timer-min {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faint);
    font-weight: 300;
  }

  .btn-timer {
    background: none;
    border: 1px solid var(--rule);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 5px 12px;
    cursor: pointer;
    color: var(--ink-light);
    transition: all 0.15s;
    width: fit-content;
  }

  .btn-timer.on { border-color: var(--accent); color: var(--accent); }

  .card-nav {
    margin-top: auto;
    display: flex;
    gap: 10px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
  }

  .btn-prev {
    padding: 16px 18px;
    background: none;
    border: 1px solid var(--rule);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--ink-light);
    cursor: pointer;
  }

  .btn-next {
    flex: 1;
    padding: 16px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    font-weight: 300;
    transition: background 0.2s;
  }

  .btn-next:hover { background: var(--accent); }

  /* ── COMPLETE ── */
  #complete {
    justify-content: center;
    align-items: center;
    padding: 48px 32px;
    text-align: center;
  }

  .complete-ring {
    width: 60px; height: 60px;
    border: 1px solid var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 28px;
    animation: pop 0.45s ease;
  }

  @keyframes pop {
    from { transform: scale(0.6); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .complete-wm {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.35em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 14px;
    font-weight: 300;
  }

  .complete-h {
    font-size: 34px;
    font-weight: 300;
    line-height: 1.2;
    margin-bottom: 10px;
    letter-spacing: -0.01em;
  }

  .complete-h em { font-style: italic; color: var(--accent); }

  .complete-streak {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--ink-light);
    margin-bottom: 40px;
    font-weight: 300;
  }

  .complete-line { width: 32px; height: 1px; background: var(--rule); margin: 0 auto 28px; }

  .complete-q {
    font-size: 15px;
    font-style: italic;
    color: var(--ink-light);
    line-height: 1.65;
    max-width: 260px;
    font-weight: 300;
  }

  .btn-ghost {
    margin-top: 44px;
    padding: 14px 28px;
    background: none;
    border: 1px solid var(--rule);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-ghost:hover { border-color: var(--ink); color: var(--ink); }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-top">
    <div class="wordmark">Anchor</div>
    <div class="home-date" id="home-date"></div>
    <div class="home-heading">Good morning,<br><em>let's begin.</em></div>
  </div>

  <div class="streak-row">
    <div class="streak-n" id="streak-n">0</div>
    <div class="streak-info">
      <strong>Day streak</strong>
      <span id="streak-sub">Start your first session</span>
    </div>
    <div class="streak-dots" id="streak-dots"></div>
  </div>

  <div class="sections-list">
    <div class="section-row">
      <div class="section-row-dot" style="background:var(--c1)"></div>
      <div class="section-row-name">Open Page</div>
      <div class="section-row-time">3 min</div>
    </div>
    <div class="section-row">
      <div class="section-row-dot" style="background:var(--c2)"></div>
      <div class="section-row-name">What's Present</div>
      <div class="section-row-time">4 min</div>
    </div>
    <div class="section-row">
      <div class="section-row-dot" style="background:var(--c3)"></div>
      <div class="section-row-name">Who I'm Becoming</div>
      <div class="section-row-time">4 min</div>
    </div>
    <div class="section-row">
      <div class="section-row-dot" style="background:var(--c4)"></div>
      <div class="section-row-name">One True Thing</div>
      <div class="section-row-time">3 min</div>
    </div>
  </div>

  <div class="home-bottom">
    <button class="btn-primary" id="btn-begin">Begin today's session</button>
    <div class="done-note" id="done-note" style="display:none">✓ completed today</div>
  </div>
</div>

<!-- SESSION -->
<div id="session" class="screen">
  <div class="session-bar">
    <button class="btn-back" id="btn-back">← back</button>
    <div class="prog-wrap">
      <div class="prog-label" id="prog-label">1 of 4</div>
      <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
  </div>
  <div class="card" id="card"></div>
</div>

<!-- COMPLETE -->
<div id="complete" class="screen">
  <div class="complete-ring">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#2C4A3E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="18 5 8.5 15.5 4 11"></polyline>
    </svg>
  </div>
  <div class="complete-wm">Anchor</div>
  <div class="complete-h">Session<br><em>complete.</em></div>
  <div class="complete-streak" id="complete-streak"></div>
  <div class="complete-line"></div>
  <div class="complete-q" id="complete-q"></div>
  <button class="btn-ghost" onclick="goHome()">Return home</button>
</div>

<script>
const SECTIONS = [
  {
    id: 'open',
    name: 'Open Page',
    color: 'var(--c1)',
    minutes: 3,
    title: 'Write anything.<br><em>Start anywhere.</em>',
    sub: 'No prompt. No structure. Just clear whatever is in your head right now.',
    type: 'none'
  },
  {
    id: 'present',
    name: "What's Present",
    color: 'var(--c2)',
    minutes: 4,
    title: "What's alive in you<br><em>this morning?</em>",
    sub: 'A question to open the door. Write wherever it takes you.',
    type: 'ai',
    system: `You are a thoughtful journaling companion. Generate a single open-ended question for a morning emotional check-in.

The person is working through: fear of rejection and overanalysis of other people's signals, moving on from unrequited feelings, building self-worth that doesn't depend on others' approval, and developing a stronger internal sense of direction.

The question should feel like a gentle doorway, not a task. Open enough that the person can take it anywhere — there's no right answer. Vary the angle each day: sometimes focus on the body or physical sensation, sometimes on what's being avoided, sometimes on mood or energy, sometimes on something unspoken, sometimes on a recent interaction.

Write only the question. No preamble. No quotation marks. One sentence, conversational tone. Don't be clinical or therapeutic-sounding.`
  },
  {
    id: 'becoming',
    name: "Who I'm Becoming",
    color: 'var(--c3)',
    minutes: 4,
    title: "The person I'm<br><em>building.</em>",
    sub: 'An opening line to write from. Take it wherever feels true.',
    type: 'rotating',
    lines: [
      "The version of me I most want to become moves through the world like…",
      "When I'm living by my own values rather than other people's reactions, I…",
      "The things I'm quietly building — in my work, my body, my character — are…",
      "What I want my life to feel like from the inside, not how it looks from the outside, is…",
      "The gap between who I am now and who I'm becoming is closing because…",
      "If I stopped waiting for external validation, the first thing I'd do differently is…",
      "Looking back on this period of my life, I want to be able to say that I…"
    ]
  },
  {
    id: 'truth',
    name: 'One True Thing',
    color: 'var(--c4)',
    minutes: 3,
    title: "The most honest<br><em>thing I can say.</em>",
    sub: "A loose stem to finish. Don't make it sound good — make it true.",
    type: 'ai',
    system: `You are a journaling companion. Generate a single sentence stem for a closing journaling prompt.

The person has just completed a 12-minute journaling session. The stem should invite one genuinely honest sentence about today, themselves, or where they are right now. It should point toward something real — not aspirational or gratitude-based.

Vary across: what they're carrying today, what they're realising, what they're letting go of, what they actually want, what they've been avoiding saying, what they know to be true.

Write only the sentence stem, ending with an ellipsis so they can complete it. No preamble. No quotation marks. Conversational, quiet tone. Under 12 words.`
  }
];

const CLOSING = [
  'The work you do in here compounds quietly.',
  'Showing up is the whole practice.',
  "Clarity doesn't arrive all at once. It accumulates.",
  'You are not your thoughts. You are the one noticing them.',
  'Every honest sentence is a small act of courage.',
  "The goal isn't to fix anything. It's to see clearly.",
  'This is how you become someone you respect.'
];

let step = 0, timerInterval = null, timerLeft = 0, timerRunning = false, aiCache = {};

const todayKey = () => new Date().toISOString().slice(0, 10);
const getStreak = () => parseInt(localStorage.getItem('anchor_streak') || '0');
const getLastDate = () => localStorage.getItem('anchor_last') || '';
const doneToday = () => getLastDate() === todayKey();

function saveStreak() {
  const today = todayKey(), last = getLastDate();
  const yest = new Date(); yest.setDate(yest.getDate() - 1);
  const yKey = yest.toISOString().slice(0, 10);
  let s = getStreak();
  if (last === today) return s;
  s = last === yKey ? s + 1 : 1;
  localStorage.setItem('anchor_streak', s);
  localStorage.setItem('anchor_last', today);
  return s;
}

function weekDots() {
  const last = getLastDate(), streak = getStreak();
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(); d.setDate(d.getDate() - (6 - i));
    const k = d.toISOString().slice(0, 10);
    if (k === todayKey() && doneToday()) return 'now';
    return (6 - i) < streak && last >= k ? 'on' : '';
  });
}

function initHome() {
  document.getElementById('home-date').textContent = new Date().toLocaleDateString('en-GB', {
    weekday: 'long', day: 'numeric', month: 'long'
  });
  const s = getStreak();
  document.getElementById('streak-n').textContent = s;
  document.getElementById('streak-sub').textContent =
    s === 0 ? 'Start your first session' :
    s === 1 ? '1 day — keep going' : `${s} days — well done`;
  document.getElementById('streak-dots').innerHTML =
    weekDots().map(d => `<div class="dot ${d}"></div>`).join('');
  const done = doneToday();
  document.getElementById('btn-begin').textContent = done ? 'Start again' : "Begin today's session";
  document.getElementById('done-note').style.display = done ? 'block' : 'none';
}

document.getElementById('btn-begin').addEventListener('click', startSession);
document.getElementById('btn-back').addEventListener('click', () => { clearTimer(); show('home'); initHome(); });

async function startSession() {
  step = 0; aiCache = {};
  show('session');
  await render(0);
}

async function render(i) {
  const s = SECTIONS[i];
  clearTimer();
  timerLeft = s.minutes * 60;
  timerRunning = false;

  document.getElementById('prog-label').textContent = `${i + 1} of ${SECTIONS.length}`;
  document.getElementById('prog-fill').style.width = `${(i / SECTIONS.length) * 100}%`;

  const card = document.getElementById('card');
  card.style.animation = 'none'; card.offsetHeight; card.style.animation = '';

  let lineHtml = '';
  if (s.type === 'ai') {
    const c = aiCache[s.id];
    lineHtml = `<div class="opening-line${c ? '' : ' loading'}" id="ol-${s.id}">
      <div class="opening-line-text${c ? '' : ' faint'}">${c || 'Generating…'}</div>
    </div>`;
  } else if (s.type === 'rotating') {
    lineHtml = `<div class="opening-line" id="ol-${s.id}">
      <div class="opening-line-text">${s.lines[new Date().getDay() % s.lines.length]}</div>
    </div>`;
  }

  const isLast = i === SECTIONS.length - 1;
  card.innerHTML = `
    <div class="card-tag">
      <div class="card-tag-dot" style="background:${s.color}"></div>
      <div class="card-tag-text" style="color:${s.color}">${s.name}</div>
    </div>
    <div class="card-title">${s.title}</div>
    <div class="card-sub">${s.sub}</div>
    ${lineHtml}
    <div class="timer-row">
      <div class="timer-ring">
        <svg width="52" height="52" viewBox="0 0 52 52">
          <circle class="ring-bg" cx="26" cy="26" r="22"/>
          <circle class="ring-fg" id="ring-fg" cx="26" cy="26" r="22"
            stroke="${s.color}"
            stroke-dasharray="${2 * Math.PI * 22}"
            stroke-dashoffset="0"/>
        </svg>
        <div class="timer-text" id="timer-txt">${fmt(timerLeft)}</div>
      </div>
      <div class="timer-right">
        <div class="timer-min">${s.minutes} min</div>
        <button class="btn-timer" id="btn-timer" onclick="toggleTimer()">Start timer</button>
      </div>
    </div>
    <div class="card-nav">
      ${i > 0 ? `<button class="btn-prev" onclick="goTo(${i - 1})">← prev</button>` : ''}
      <button class="btn-next" onclick="${isLast ? 'finish()' : `goTo(${i + 1})`}">
        ${isLast ? 'Complete session' : 'Next →'}
      </button>
    </div>`;

  if (s.type === 'ai' && !aiCache[s.id]) fetchAI(s);
}

async function goTo(i) { step = i; await render(i); }

async function fetchAI(s) {
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: s.system,
        messages: [{ role: 'user', content: `Today is ${new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' })}.` }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text?.trim() || fallback(s.id);
    aiCache[s.id] = text;
    const ol = document.getElementById(`ol-${s.id}`);
    if (ol) {
      ol.classList.remove('loading');
      const t = ol.querySelector('.opening-line-text');
      t.classList.remove('faint');
      t.textContent = text;
    }
  } catch {
    aiCache[s.id] = fallback(s.id);
    const ol = document.getElementById(`ol-${s.id}`);
    if (ol) {
      ol.classList.remove('loading');
      const t = ol.querySelector('.opening-line-text');
      t.classList.remove('faint');
      t.textContent = aiCache[s.id];
    }
  }
}

function fallback(id) {
  return id === 'present'
    ? "What are you carrying into this morning that you haven't fully looked at yet?"
    : "The thing I keep coming back to, if I'm honest, is…";
}

function fmt(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }

function toggleTimer() {
  if (timerRunning) {
    clearTimer(); timerRunning = false;
    const b = document.getElementById('btn-timer');
    if (b) { b.textContent = 'Resume'; b.classList.remove('on'); }
  } else {
    timerRunning = true;
    const b = document.getElementById('btn-timer');
    if (b) { b.textContent = 'Pause'; b.classList.add('on'); }
    const total = SECTIONS[step].minutes * 60;
    const circ = 2 * Math.PI * 22;
    timerInterval = setInterval(() => {
      timerLeft--;
      const txt = document.getElementById('timer-txt');
      const ring = document.getElementById('ring-fg');
      if (txt) txt.textContent = fmt(timerLeft);
      if (ring) ring.style.strokeDashoffset = circ * (1 - timerLeft / total);
      if (timerLeft <= 0) {
        clearTimer(); timerRunning = false;
        const b = document.getElementById('btn-timer');
        if (b) { b.textContent = 'Done ✓'; b.classList.remove('on'); }
      }
    }, 1000);
  }
}

function clearTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }

function finish() {
  clearTimer();
  const s = saveStreak();
  document.getElementById('complete-streak').textContent =
    s === 1 ? 'Day 1 — the hardest one.' : `${s} day streak.`;
  document.getElementById('complete-q').textContent =
    CLOSING[Math.floor(Math.random() * CLOSING.length)];
  show('complete');
}

function goHome() { show('home'); initHome(); }
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

  name: 'ANCHOR', short_name: 'ANCHOR', start_url: './', display: 'standalone',
  background_color: '#F7F4EF', theme_color: '#1A1A1A',
  icons: [
    { src: 'https://placehold.co/192x192/1A1A18/F7F4EF?text=A', sizes: '192x192', type: 'image/png' },
    { src: 'https://placehold.co/512x512/1A1A18/F7F4EF?text=A', sizes: '512x512', type: 'image/png' }
  ]
})], { type: 'application/json' });
document.getElementById('manifest-placeholder').href = URL.createObjectURL(mBlob);

if ('serviceWorker' in navigator) {
  const sw = `const C='anchor-v1';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['./']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
  navigator.serviceWorker.register(
    URL.createObjectURL(new Blob([sw], { type: 'application/javascript' })), { scope: './' }
  ).catch(() => {});
}

initHome();
</script>
